<app-navbar (openLogin)="openLogin()" (openSignup)="openSignup()"></app-navbar>

<main class="dive-page" aria-label="Deep Dive — About Me">

  <!-- Page Header -->
  <header class="dive-header">
    <div class="dive-header-text">
      <h1 class="dive-heading">Everything<br><span class="dive-heading-dim">about me</span></h1>
      <p class="dive-sub">A structured look at who I am, what I build, and what I love.</p>
    </div>

    <!-- Resume Header Actions -->
    <div class="dive-header-actions">
      <div class="header-resume-group">
        <a href="https://drive.google.com/file/d/1VArkAspwN7egQwuRI3xRceWlu_-FqJXQ/view?usp=drive_link" target="_blank" rel="noopener noreferrer" class="header-resume-btn" aria-label="View Resume">
          View Resume
        </a>
        <a href="https://drive.google.com/uc?export=download&id=1VArkAspwN7egQwuRI3xRceWlu_-FqJXQ" class="header-resume-dl" aria-label="Download Resume" title="Download Resume">
          <span aria-hidden="true">↓</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Tabs Navigation -->
  <nav class="dive-tabs-container">
    <div class="dive-tabs">
      <button class="tab-item" [class.active]="currentTab() === 'about'" (click)="setTab('about', $event)">
        About
        <span class="tab-indicator"></span>
      </button>
      <button class="tab-item" [class.active]="currentTab() === 'project'" (click)="setTab('project', $event)">
        Projects
        <span class="tab-indicator"></span>
      </button>
      <button class="tab-item" [class.active]="currentTab() === 'lifestyle'" (click)="setTab('lifestyle', $event)">
        Lifestyle
        <span class="tab-indicator"></span>
      </button>
      <button class="tab-item" [class.active]="currentTab() === 'certificate'" (click)="setTab('certificate', $event)">
        Certification
        <span class="tab-indicator"></span>
      </button>
      <button class="tab-item" [class.active]="currentTab() === 'connect'" (click)="setTab('connect', $event)">
        Connect
        <span class="tab-indicator"></span>
      </button>
    </div>
  </nav>

  <!-- Bento Grid -->
  <div class="bento-grid">

    @switch (currentTab()) {
      @case ('about') {
        <app-about-section class="bento-full" appScrollReveal></app-about-section>
        <app-learning-materials class="bento-full" appScrollReveal></app-learning-materials>
        <app-professional-info class="bento-full" appScrollReveal></app-professional-info>
        <app-education class="bento-half" appScrollReveal></app-education>
        <app-personal-info class="bento-half" appScrollReveal></app-personal-info>
      }
      @case ('project') {
        <app-projects class="bento-full" appScrollReveal></app-projects>
      }
      @case ('lifestyle') {
        <app-entertainment class="bento-full" appScrollReveal></app-entertainment>
      }
      @case ('certificate') {
        <app-certification class="bento-full" appScrollReveal></app-certification>
      }
      @case ('connect') {
        <app-social-links class="bento-full" appScrollReveal></app-social-links>
      }
    }

  </div>


</main>

<!-- Login Modal -->
@if (showLoginModal()) {
  <app-login (close)="closeLogin()" (openSignup)="openSignup()"></app-login>
}

<!-- Signup Modal -->
@if (showSignupModal()) {
  <app-signup (close)="closeSignup()" (openLogin)="openLogin()"></app-signup>
}
