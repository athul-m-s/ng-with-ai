<div class="fixed inset-0 z-50 grid place-items-center overflow-y-auto p-4 sm:p-6 bg-background/80 backdrop-blur-sm animate-modal-overlay" (click)="close.emit()">
  <div class="relative w-full max-w-md sm:max-w-lg bg-background border border-border shadow-lg sm:rounded-xl rounded-lg p-6 animate-modal-content h-fit my-auto" (click)="$event.stopPropagation()">
    <div class="flex flex-col space-y-1.5 text-center sm:text-left mb-4">
      <h2 class="text-lg font-semibold leading-none tracking-tight">Create Account</h2>
      <button class="absolute right-4 top-4 rounded-sm opacity-70 ring-offset-background transition-opacity hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 disabled:pointer-events-none data-[state=open]:bg-accent data-[state=open]:text-muted-foreground" (click)="close.emit()">
        <span class="sr-only">Close</span>
        &times;
      </button>
    </div>
    
    <form class="space-y-4" (submit)="onSubmit($event)">
      @if (auth.signupError()) {
        <div class="p-3 rounded-md bg-destructive/15 text-destructive text-sm font-medium">{{ auth.signupError() }}</div>
      }
      
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
          <label for="signup-name" class="text-sm font-medium leading-none">Name</label>
          <input type="text" id="signup-name" name="name" placeholder="John Doe" required class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:opacity-50" />
        </div>
        <div class="space-y-2">
          <label for="signup-age" class="text-sm font-medium leading-none">Age</label>
          <input type="number" id="signup-age" name="age" placeholder="25" min="13" max="120" required class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:opacity-50" />
        </div>
      </div>
      
      <div class="space-y-2">
        <label for="signup-email" class="text-sm font-medium leading-none">Email</label>
        <input type="email" id="signup-email" name="email" placeholder="you@example.com" autocomplete="username" required class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:opacity-50" />
      </div>
      
      <div class="space-y-2">
        <label for="signup-password" class="text-sm font-medium leading-none">Password</label>
        <input type="password" id="signup-password" name="password" placeholder="••••••••" autocomplete="new-password" required class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:opacity-50" />
      </div>
      
      <button type="submit" [disabled]="auth.isSigningUp()" class="inline-flex items-center justify-center rounded-md text-sm font-medium bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 w-full mt-4 disabled:opacity-50">
        {{ auth.isSigningUp() ? 'Creating Account...' : 'Sign Up' }}
      </button>
      
      <p class="text-center text-sm text-muted-foreground mt-4">
        Already have an account?
        <a href="#" class="font-medium text-primary hover:underline underline-offset-4" (click)="openLogin.emit(); $event.preventDefault()">Login</a>
      </p>
    </form>
  </div>
</div>
