<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Create Account</h2>
      <button class="close-btn" (click)="close.emit()">&times;</button>
    </div>
    <form class="minimal-form" (submit)="onSubmit($event)">
      @if (auth.signupError()) {
        <div class="form-error">{{ auth.signupError() }}</div>
      }
      <div class="form-group row">
        <div class="col">
          <label for="signup-name">Name</label>
          <input type="text" id="signup-name" name="name" placeholder="John Doe" required />
        </div>
        <div class="col">
          <label for="signup-age">Age</label>
          <input type="number" id="signup-age" name="age" placeholder="25" min="13" max="120" required />
        </div>
      </div>
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" name="email" placeholder="you@example.com" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" placeholder="••••••••" autocomplete="new-password" required />
      </div>
      <button type="submit" class="submit-btn" style="margin-top: 1rem" [disabled]="auth.isSigningUp()">
        {{ auth.isSigningUp() ? 'Creating Account...' : 'Sign Up' }}
      </button>
      <p class="form-footer">
        Already have an account?
        <a href="#" (click)="openLogin.emit(); $event.preventDefault()">Login</a>
      </p>
    </form>
  </div>
</div>
