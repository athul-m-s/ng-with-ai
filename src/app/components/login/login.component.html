<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Welcome Back</h2>
      <button class="close-btn" (click)="close.emit()">&times;</button>
    </div>
    <form class="minimal-form" (submit)="onSubmit($event)">
      @if (auth.loginError()) {
        <div class="form-error">{{ auth.loginError() }}</div>
      }
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="email" placeholder="you@example.com" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="submit-btn" [disabled]="auth.isLoggingIn()">
        {{ auth.isLoggingIn() ? 'Logging in...' : 'Login' }}
      </button>
      <p class="form-footer">
        Don't have an account?
        <a href="#" (click)="openSignup.emit(); $event.preventDefault()">Sign up</a>
      </p>
    </form>
  </div>
</div>
