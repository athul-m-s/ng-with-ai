<div class="fixed inset-0 z-50 grid place-items-center overflow-y-auto p-4 sm:p-6 bg-background/80 backdrop-blur-sm animate-modal-overlay" (click)="close.emit()">
  <div class="relative w-full max-w-md bg-background border border-border shadow-lg sm:rounded-xl rounded-lg p-6 animate-modal-content h-fit my-auto" (click)="$event.stopPropagation()">
    <div class="flex flex-col space-y-1.5 text-center sm:text-left mb-4">
      <h2 class="text-lg font-semibold leading-none tracking-tight">Welcome Back</h2>
      <button class="absolute right-4 top-4 rounded-sm opacity-70 ring-offset-background transition-opacity hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 disabled:pointer-events-none data-[state=open]:bg-accent data-[state=open]:text-muted-foreground" (click)="close.emit()">
        <span class="sr-only">Close</span>
        &times;
      </button>
    </div>
    
    <form class="space-y-4" (submit)="onSubmit($event)">
      @if (auth.loginError()) {
        <div class="p-3 rounded-md bg-destructive/15 text-destructive text-sm font-medium">{{ auth.loginError() }}</div>
      }
      
      <div class="space-y-2">
        <label for="login-email" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Email</label>
        <input type="email" id="login-email" name="email" placeholder="you@example.com" autocomplete="username" required class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50" />
      </div>
      
      <div class="space-y-2">
        <label for="login-password" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Password</label>
        <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50" />
      </div>
      
      <button type="submit" [disabled]="auth.isLoggingIn()" class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 w-full mt-4">
        {{ auth.isLoggingIn() ? 'Logging in...' : 'Login' }}
      </button>
      
      <p class="text-center text-sm text-muted-foreground mt-4">
        Don't have an account?
        <a href="#" class="font-medium text-primary hover:underline underline-offset-4" (click)="openSignup.emit(); $event.preventDefault()">Sign up</a>
      </p>
    </form>
  </div>
</div>
