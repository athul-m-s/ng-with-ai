<nav class="mono-nav">
  <div class="mono-nav__inner">
    <!-- Brand -->
    <div class="mono-nav__brand">
      <span class="mono-nav__logo" aria-hidden="true">A</span>
    </div>

    <!-- Auth Actions -->
    <div class="mono-nav__actions">
      @if (auth.isLoggedIn()) {
        <div class="mono-nav__user">
          <span class="mono-nav__avatar" aria-hidden="true">
            {{ auth.userProfile()?.name?.charAt(0) }}
          </span>
          <span class="mono-nav__user-name">{{ auth.userProfile()?.name }}</span>
        </div>
        <button class="mono-btn mono-btn--ghost" (click)="onLogout()">Logout</button>
      } @else {
        <button class="mono-btn mono-btn--ghost" (click)="openLogin.emit()">Login</button>
        <button class="mono-btn mono-btn--outline" (click)="openSignup.emit()">Sign Up</button>
      }
    </div>
  </div>
</nav>
